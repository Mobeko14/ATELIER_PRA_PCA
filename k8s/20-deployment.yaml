apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask
  namespace: pra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: pra/flask-sqlite:2.0
          imagePullPolicy: Never

          # 🔥 IMPORTANT : lance Flask en continu
          command: ["python"]
          args: ["/app/app.py"]

          ports:
            - containerPort: 5000

          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: backup-volume
              mountPath: /backup

      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: pra-data
        - name: backup-volume
          persistentVolumeClaim:
            claimName: pra-backup
